server.port=8081
spring.application.name=ms-clientes

spring.datasource.url=jdbc:mysql://localhost:3306/db_clientes?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
